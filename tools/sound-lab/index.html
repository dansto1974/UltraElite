<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ultra Elite Sound Lab</title>
  <link rel="stylesheet" href="sound-lab.css">
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div>
        <p class="eyebrow">Ultra Elite Workshop</p>
        <h1>Sound Lab</h1>
      </div>
      <div class="transport">
        <button id="playBtn" class="primary">Play</button>
        <button id="stopBtn">Stop</button>
        <span id="transportStatus" class="transport-status">STOPPED</span>
      </div>
    </header>

    <section class="prompt">
      <label for="soundPrompt">Describe the sound</label>
      <div class="prompt-row">
        <input id="soundPrompt" type="text" value="low distorted blast-off square wave with rumble">
        <button id="suggestBtn">Suggest Patch</button>
      </div>
    </section>

    <section class="workspace">
      <aside class="panel presets">
        <h2>Presets</h2>
        <label class="preset-select-wrap">Game Sound
          <select id="presetSelect"></select>
        </label>
        <div class="bank-actions">
          <button id="copyAll">Copy Bank</button>
          <button id="importAll">Import Bank</button>
        </div>
        <p id="bankStatus" class="bank-status">TWEAK PRESETS, THEN COPY BANK.</p>
      </aside>

      <section class="panel editor">
        <div class="section-head">
          <div>
            <h2>Patch</h2>
            <p id="patchSummary">Layered procedural Web Audio patch.</p>
          </div>
          <button id="addLayerBtn">Add Layer</button>
        </div>

        <div class="master-grid">
          <label>Game Sound Name <input id="patchName" type="text"></label>
          <label>Master Gain <input id="masterGain" type="range" min="0" max="1" step="0.01"></label>
          <label>Bus
            <select id="busSelect">
              <option>cockpit</option>
              <option>weapons</option>
              <option>ship</option>
              <option>world</option>
              <option>ambience</option>
            </select>
          </label>
          <label>Pitch Scale <input id="pitchScale" type="range" min="0.25" max="1.4" step="0.01"></label>
          <label class="check-control"><input id="bedToggle" type="checkbox"> Continuous Bed</label>
        </div>

        <div id="layers" class="layers"></div>
      </section>
    </section>
  </main>

  <template id="layerTemplate">
    <article class="layer-card">
      <div class="layer-title">
        <input class="layer-name" type="text" aria-label="Layer name">
        <select class="layer-kind" aria-label="Layer type">
          <option value="osc">Oscillator</option>
          <option value="noise">Noise</option>
          <option value="rumble">Rumble</option>
          <option value="ticks">Spark Ticks</option>
        </select>
        <button class="duplicate-layer" title="Duplicate layer">Duplicate</button>
        <button class="remove-layer" title="Remove layer">Remove</button>
      </div>
      <div class="control-grid"></div>
    </article>
  </template>

  <script src="sound-lab.js"></script>
</body>
</html>
